name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: leadgen
          POSTGRES_PASSWORD: leadgen
          POSTGRES_DB: leadgen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leadgen"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BOT_TOKEN: test-token
      GOOGLE_PLACES_API_KEY: test-key
      DATABASE_URL: postgresql://leadgen:leadgen@localhost:5432/leadgen
      ANTHROPIC_API_KEY: test-anthropic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Alembic upgrade (smoke-test migrations)
        run: alembic upgrade head

      - name: Pytest
        run: pytest
