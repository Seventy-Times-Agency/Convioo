<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Convioo — Settings</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: -apple-system, system-ui, sans-serif;
      max-width: 460px;
      color: #1f2937;
    }
    h1 { font-size: 18px; margin: 0 0 6px; }
    p.sub { color: #6b7280; font-size: 13px; margin: 0 0 22px; }
    label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 11px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font: inherit;
      margin-bottom: 14px;
    }
    button {
      padding: 10px 16px;
      border: 1px solid #10B5B0;
      background: #10B5B0;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .ok { color: #16a34a; margin-left: 12px; font-size: 13px; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 6px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Convioo extension settings</h1>
  <p class="sub">Tell the extension where to send your saves.</p>

  <label for="apiUrl">API URL</label>
  <input id="apiUrl" type="text" placeholder="https://your-api.up.railway.app" />
  <div class="hint">Public URL of your Convioo backend (Railway). No trailing slash.</div>

  <label for="userId" style="margin-top: 16px;">User ID</label>
  <input id="userId" type="number" placeholder="123" />
  <div class="hint">Find this in /app/profile or /app/settings on your Convioo site.</div>

  <div style="margin-top: 18px;">
    <button id="save">Save</button>
    <span id="status" class="ok"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
