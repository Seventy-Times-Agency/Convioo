# Curated B2B niche taxonomy — used by /api/v1/niches autocomplete.
#
# Each entry has a stable ``id`` (snake_case) plus per-language labels
# (en/ru/uk/de) and free-form ``aliases`` to catch how a salesperson
# would actually type the niche ("дантисты", "стоматологи", "dental").
#
# Niches are ordered loosely by category for editing convenience; the
# loader doesn't depend on order.
#
# Adding a niche: keep the id snake_case, fill all four language labels
# (use the English label as fallback for missing translations), and add
# 2-5 common aliases per locale you care about. Please don't translate
# trade jargon into something nobody actually says — better to leave a
# label in English than guess.

